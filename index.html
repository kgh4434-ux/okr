<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>OKR Workspace v2 (트리 중심)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css"/>
<style>
:root{--bg:#fff;--bgs:#FAFAFA;--bgh:#F4F4F5;--bgm:#F0F0F2;--bd:#E4E4E7;--bdt:#D4D4D8;--tx:#09090B;--tx2:#27272A;--tx3:#52525B;--tx4:#71717A;--tx5:#A1A1AA;--ac:#2563EB;--ach:#1D4ED8;--acbg:#EFF6FF;--s:#10B981;--sbg:#ECFDF5;--stx:#065F46;--w:#F59E0B;--wbg:#FFFBEB;--wtx:#92400E;--d:#EF4444;--dbg:#FEF2F2;--dtx:#991B1B;--ff:'Pretendard Variable',Pretendard,-apple-system,sans-serif;--fm:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}html{font-size:15px}
body{font-family:var(--ff);background:var(--bg);color:var(--tx);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
.mono{font-family:var(--fm);font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
/* Login */
.login{position:fixed;inset:0;background:#FAFAFA;display:flex;align-items:center;justify-content:center;z-index:100;padding:24px}
.lc{background:#fff;border:1px solid var(--bd);border-radius:14px;padding:36px 32px;width:100%;max-width:440px;box-shadow:0 8px 24px rgba(0,0,0,.04)}
.lb{text-align:center;margin-bottom:24px}
.lb h1{font-size:22px;font-weight:700;margin-bottom:4px;letter-spacing:-.02em}
.lb p{color:var(--tx4);font-size:13px}
.lsearch{margin-bottom:10px}
.lsearch input{width:100%;height:38px;background:#fff;border:1px solid var(--bd);border-radius:8px;padding:0 14px;font-size:13px;outline:none}
.lsearch input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.lul{display:grid;gap:6px;max-height:240px;overflow-y:auto;margin-bottom:14px}
.lul-hint{font-size:11px;color:var(--tx5);text-align:center;padding:18px 0}
.lu{display:grid;grid-template-columns:32px 1fr auto;gap:10px;align-items:center;padding:10px 12px;background:#fff;border:1px solid var(--bd);border-radius:8px;cursor:pointer;transition:.12s}
.lu:hover{background:var(--bgh)}
.lu.sel{background:var(--acbg);border-color:var(--ac)}
.luav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:13px}
.lun{font-size:13px;font-weight:500}
.lur{font-size:11px;color:var(--tx4);margin-top:1px}
.lutag{font-family:var(--fm);font-size:10px;color:var(--tx4);padding:2px 7px;background:var(--bgh);border-radius:4px}
.lpw input{width:100%;height:40px;background:#fff;border:1px solid var(--bd);border-radius:8px;padding:0 14px;font-size:13px;outline:none}
.lpw input:focus{border-color:var(--ac)}
.lerr{color:var(--dtx);font-size:11px;margin:8px 0 0;display:none}
.lerr.on{display:block}
.lbtn{width:100%;height:42px;background:var(--tx);color:#fff;border-radius:8px;font-weight:600;font-size:14px;margin-top:14px}
.lbtn:hover{background:#000}
.lhint{text-align:center;color:var(--tx5);font-size:11px;margin-top:10px;font-family:var(--fm)}
/* App */
.app{display:none}
.app.on{display:block}
.top{height:56px;background:#fff;border-bottom:1px solid var(--bd);padding:0 28px;display:flex;align-items:center;gap:28px;position:sticky;top:0;z-index:20}
.brand{font-size:16px;font-weight:700;letter-spacing:-.02em;margin-right:14px}
.tabs{display:flex;gap:2px;flex:1;height:100%}
.tab{padding:0 14px;display:inline-flex;align-items:center;font-size:13px;color:var(--tx4);cursor:pointer;border-bottom:2px solid transparent;height:100%;font-weight:500;letter-spacing:-.01em}
.tab:hover{color:var(--tx2)}
.tab.on{color:var(--tx);border-bottom-color:var(--tx);font-weight:600}
.tbr{display:flex;align-items:center;gap:12px;font-family:var(--fm);font-size:11px;color:var(--tx4)}
.uav{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:12px;cursor:pointer}
main{padding:32px 36px;max-width:1400px;margin:0 auto}
[data-tab]{display:none}
[data-tab].on{display:block}
.ph{margin-bottom:24px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px}
.ph h1{font-size:28px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.ph p{color:var(--tx4);font-size:13px}
.ph-r{display:flex;gap:8px}
.btn{height:34px;padding:0 14px;border-radius:7px;font-size:13px;font-weight:500;border:1px solid var(--bd);background:#fff;color:var(--tx);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--bdt);background:var(--bgh)}
.btnp{background:var(--tx);color:#fff;border-color:var(--tx)}
.btnp:hover{background:#000;border-color:#000}
.btn-sm{height:28px;font-size:12px;padding:0 10px}
.btn-d{color:var(--dtx);border-color:var(--bd)}
.btn-d:hover{background:var(--dbg);border-color:var(--dbd)}
/* Dashboard cards */
.kgr{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.kc{padding:20px 22px;border:1px solid var(--bd);border-radius:12px;background:#fff}
.kc-l{font-size:12px;color:var(--tx4);margin-bottom:10px;font-weight:500}
.kc-v{font-family:var(--fm);font-size:32px;font-weight:700;letter-spacing:-.02em;line-height:1}
.kc-v small{font-size:13px;color:var(--tx4);margin-left:4px}
.kc-d{font-size:11px;color:var(--tx4);margin-top:6px;font-family:var(--fm)}
/* Tree */
.tree{padding:8px 0}
.node{position:relative;border-left:1.5px solid var(--bd);margin-left:14px;padding-left:0}
.node.root{border-left:none;margin-left:0}
.row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;cursor:pointer;position:relative;margin:1px 0}
.row:hover{background:var(--bgh)}
.row.sel{background:var(--acbg)}
.row.root{padding:14px 16px;background:var(--bgs);margin-bottom:6px;border:1px solid var(--bd);border-radius:10px}
.row.root.sel{border-color:var(--ac);background:var(--acbg)}
.expand{width:18px;height:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx4);font-size:10px;flex-shrink:0;border-radius:4px;transition:.12s}
.expand:hover{background:var(--bgm);color:var(--tx)}
.expand.open{transform:rotate(90deg)}
.expand.leaf{visibility:hidden}
.rd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rt{flex:1;min-width:0;display:flex;align-items:center;gap:10px;font-size:13px}
.rt b{font-weight:600}
.rid{font-family:var(--fm);font-size:11px;color:var(--tx5);font-weight:500}
.biz-tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid;letter-spacing:-.01em}
.rtag{font-family:var(--fm);font-size:10px;color:var(--tx4);background:var(--bgm);padding:2px 6px;border-radius:4px}
.row.root .rt{font-size:15px;font-weight:600}
.row.lvl1 .rt{font-size:14px;font-weight:600}
.rprog{display:flex;align-items:center;gap:10px;min-width:120px;flex-shrink:0}
.rbar{width:60px;height:5px;background:var(--bgm);border-radius:99px;overflow:hidden}
.rbar-f{height:100%;background:var(--ac);border-radius:99px}
.rpct{font-family:var(--fm);font-size:12px;font-weight:600;min-width:38px;text-align:right}
.rpct.s{color:var(--stx)}.rpct.o{color:var(--ac)}.rpct.w{color:var(--wtx)}.rpct.d{color:var(--dtx)}
.rown{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--tx3);min-width:80px}
.rown .av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:600;font-family:var(--fm)}
.children{margin-left:22px}
.children[hidden]{display:none}
.empty-c{padding:8px 12px;color:var(--tx5);font-size:12px;font-style:italic;margin-left:22px}
/* Business cards (Biz tab) */
.bgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.bcard{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:22px;cursor:pointer;transition:.15s}
.bcard:hover{border-color:var(--bdt);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.04)}
.bch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.bcn{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.bcd{font-size:11px;color:var(--tx4);font-family:var(--fm);margin-top:4px}
.bcobj{font-size:13px;color:var(--tx2);line-height:1.5;margin-bottom:16px;padding:10px 12px;background:var(--bgs);border-radius:8px;font-style:italic}
.bcp{display:flex;align-items:baseline;gap:10px;margin-bottom:8px}
.bcpv{font-family:var(--fm);font-size:32px;font-weight:700;letter-spacing:-.02em}
.bcpu{font-family:var(--fm);font-size:13px;color:var(--tx4)}
.bcpb{height:5px;background:var(--bgm);border-radius:99px;overflow:hidden;margin-bottom:12px}
.bcpbf{height:100%;border-radius:99px;background:var(--ac)}
.bcm{font-size:12px;color:var(--tx4);display:flex;justify-content:space-between}
/* Report */
.rep{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:24px;margin-bottom:14px}
.rep h3{font-size:15px;font-weight:600;margin-bottom:14px}
.rep-r{display:grid;grid-template-columns:140px 1fr 80px;gap:14px;align-items:center;padding:10px 0;border-bottom:1px solid var(--bgh)}
.rep-r:last-child{border-bottom:none}
.rep-bar{height:8px;background:var(--bgm);border-radius:99px;overflow:hidden}
.rep-bf{height:100%;border-radius:99px}
.pct-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:99px;font-family:var(--fm);font-size:11px;font-weight:600;margin-left:6px}
.pct-badge.over{background:#DBEAFE;color:#1E40AF}
.pct-badge.ok{background:var(--sbg);color:var(--stx)}
.pct-badge.warn{background:var(--wbg);color:var(--wtx)}
.pct-badge.risk{background:var(--dbg);color:var(--dtx)}
.pct-color.over{color:#1E40AF}
.pct-color.ok{color:var(--stx)}
.pct-color.warn{color:var(--wtx)}
.pct-color.risk{color:var(--dtx)}
.pct-badge.none{background:#F3F4F6;color:#6B7280}
.pct-color.none{color:#6B7280}
.kc-meter-f.none{background:#9CA3AF}
.trend{display:inline-flex;align-items:center;gap:2px;font-family:var(--fm);font-size:11px;color:var(--tx4);margin-left:4px}
.trend.up{color:var(--stx)}
.trend.down{color:var(--dtx)}
.kr-flag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:99px;font-family:var(--fm);font-size:10px;font-weight:600;margin-left:6px;white-space:nowrap}
.kr-flag.pending{background:#FEF3C7;color:#92400E}
.kr-flag.health{background:#DBEAFE;color:#1E40AF}
.kr-flag.link{background:#E0E7FF;color:#3730A3}
.kr-flag.wait{background:#F3F4F6;color:#374151}
.wait-note{font-size:11px;color:var(--wtx);background:var(--wbg);border:1px dashed #FDE68A;border-radius:6px;padding:6px 10px;margin-top:8px}
/* Dashboard 카드 강화 */
.kc{position:relative;overflow:hidden}
.kc-v{font-size:42px}
.kc-meter{height:6px;background:var(--bgm);border-radius:99px;overflow:hidden;margin-top:10px}
.kc-meter-f{height:100%;background:var(--ac);border-radius:99px}
.kc-meter-f.over{background:#1E40AF}
.kc-meter-f.ok{background:var(--s)}
.kc-meter-f.warn{background:var(--w)}
.kc-meter-f.risk{background:var(--d)}
.kc-badge-row{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
/* 비밀번호 변경 모달 */
.modal{position:fixed;inset:0;background:rgba(9,9,11,.4);display:none;align-items:center;justify-content:center;z-index:60;padding:24px}
.modal.on{display:flex}
.modal-c{background:#fff;border-radius:14px;max-width:440px;width:100%;padding:26px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-h{font-size:17px;font-weight:600;margin-bottom:14px;letter-spacing:-.01em}
.modal-f{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.modal input{width:100%;height:38px;border:1px solid var(--bd);border-radius:8px;padding:0 12px;font-size:13px;outline:none;margin-bottom:10px}
.modal input:focus{border-color:var(--ac)}
.src-tag{display:inline-flex;align-items:center;padding:1px 6px;border-radius:4px;font-family:var(--fm);font-size:9px;font-weight:600;margin-left:5px;letter-spacing:.02em}
.src-tag.dummy{background:#F3F4F6;color:#71717A;border:1px solid #E4E4E7}
.src-tag.real{background:#DBEAFE;color:#1E40AF;border:1px solid #BFDBFE}
.src-tag.unset{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A}
/* Org shapes */
.org-shapes{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:20px}
.org-shape{padding:18px 22px;border:2px solid var(--bd);border-radius:14px;cursor:pointer;background:#fff;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:150px;transition:.15s;position:relative}
.org-shape:hover{border-color:var(--bdt);transform:translateY(-1px)}
.org-shape.on{border-color:var(--ac);background:var(--acbg)}
.org-shape-c{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;margin-bottom:4px}
.org-shape-n{font-size:14px;font-weight:600}
.org-shape-l{font-family:var(--fm);font-size:11px;color:var(--tx4)}
.org-shape-cnt{position:absolute;top:8px;right:10px;font-family:var(--fm);font-size:10px;background:var(--bgm);padding:2px 7px;border-radius:99px;color:var(--tx3);font-weight:500}
.org-shape.all{background:var(--tx);border-color:var(--tx)}
.org-shape.all .org-shape-n,.org-shape.all .org-shape-l{color:#fff}
.org-shape.all .org-shape-cnt{background:rgba(255,255,255,.2);color:#fff}
/* User table */
.utbl{background:#fff;border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.uth{display:grid;grid-template-columns:36px 1fr 1fr 110px 110px 50px;gap:14px;padding:12px 18px;background:var(--bgs);font-family:var(--fm);font-size:10px;color:var(--tx4);text-transform:uppercase;letter-spacing:.06em;font-weight:600;border-bottom:1px solid var(--bd)}
.urow{display:grid;grid-template-columns:36px 1fr 1fr 110px 110px 50px;gap:14px;padding:13px 18px;border-bottom:1px solid var(--bgh);align-items:center;font-size:13px}
.urow:last-child{border-bottom:none}
.urow:hover{background:var(--bgs)}
.uavn{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:12px}
.usub{font-size:11px;color:var(--tx4);margin-top:2px}
.urtag{font-family:var(--fm);font-size:11px;color:var(--tx3);padding:3px 8px;background:var(--bgm);border-radius:5px}
/* Setting */
.sgrp{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:22px;margin-bottom:14px}
.sgrp h3{font-size:15px;font-weight:600;margin-bottom:4px}
.sgrp .desc{font-size:12px;color:var(--tx4);margin-bottom:14px}
.srow{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--bgh);font-size:13px}
.srow:last-child{border-bottom:none}
.srow label{font-weight:500}
.srow .sub{font-size:11px;color:var(--tx4);margin-top:2px}
.srow select,.srow input{height:32px;border:1px solid var(--bd);border-radius:6px;padding:0 10px;font-size:12px;background:#fff;outline:none;min-width:180px}
/* Modal */
.modal{position:fixed;inset:0;background:rgba(9,9,11,.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:24px;backdrop-filter:blur(4px)}
.modal[hidden]{display:none}
.mc{background:#fff;border-radius:14px;max-width:620px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 48px rgba(0,0,0,.18)}
.mh{padding:22px 26px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.mh h3{font-size:17px;font-weight:600;letter-spacing:-.01em}
.mh .sub{font-family:var(--fm);font-size:11px;color:var(--tx4);margin-top:3px}
.mcl{padding:6px 10px;color:var(--tx4);font-size:22px;cursor:pointer;border-radius:6px;line-height:1}
.mcl:hover{background:var(--bgh);color:var(--tx)}
.mb{padding:22px 26px}
.mf{padding:16px 26px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end}
.mf .lf{margin-right:auto;font-family:var(--fm);font-size:11px;color:var(--tx4);align-self:center}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:12px;font-weight:500;margin-bottom:6px}
.fg input,.fg textarea,.fg select{width:100%;border:1px solid var(--bd);border-radius:7px;padding:9px 12px;font-size:13px;background:#fff;outline:none}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.fg textarea{resize:vertical;min-height:60px;line-height:1.5}
.fg .hint{font-size:11px;color:var(--tx4);margin-top:5px}
.knum{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px;background:var(--bgs);border-radius:8px;margin-bottom:14px}
.knl{font-family:var(--fm);font-size:10px;color:var(--tx4);text-transform:uppercase;margin-bottom:3px;letter-spacing:.06em}
.knv{font-family:var(--fm);font-size:16px;font-weight:600}
.bd{font-family:var(--fm);font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px}
.bd.s{background:var(--sbg);color:var(--stx)}.bd.o{background:var(--acbg);color:var(--ach)}.bd.w{background:var(--wbg);color:var(--wtx)}.bd.d{background:var(--dbg);color:var(--dtx)}
.bd.com{background:#E0E7FF;color:#3730A3}.bd.asp{background:#FCE7F3;color:#9D174D}
.lock-b{padding:10px 14px;background:var(--bgs);border:1px solid var(--bd);border-radius:7px;font-size:12px;color:var(--tx3);margin-bottom:14px}
.empty{padding:60px 20px;text-align:center;color:var(--tx4)}
.empty-i{font-size:38px;margin-bottom:12px;opacity:.4}
.empty-t{font-size:14px;font-weight:500;color:var(--tx2);margin-bottom:6px}
.empty-d{font-size:12px}
@media(max-width:1100px){.kgr{grid-template-columns:repeat(2,1fr)}}
@media(max-width:720px){.kgr{grid-template-columns:1fr}.top{padding:0 16px;gap:14px}.tab{padding:0 8px;font-size:12px}.brand{font-size:14px;margin-right:6px}main{padding:24px 18px}}
</style></head><body>
<div class="login" id="login"><div class="lc">
<div class="lb"><h1>OKR Workspace</h1><p>이름으로 검색 또는 사업부 선택</p></div>
<div class="lsearch"><input type="text" id="userSearch" placeholder="이름 또는 사업부 검색 (예: 곽경훈, 익스)" autocomplete="off"></div>
<div class="lul" id="userList"></div>
<div class="lpw"><input type="password" id="pw" placeholder="비밀번호 (초기 1234)"></div>
<div class="lerr" id="loginErr">비밀번호가 일치하지 않습니다</div>
<button class="lbtn" id="loginBtn">로그인</button>
<div class="lhint">초기 비밀번호: 1234</div>
</div></div>
<div class="modal" id="mPw" hidden><div class="modal-c">
<div class="modal-h">비밀번호 변경</div>
<input type="password" id="pwOld" placeholder="현재 비밀번호">

const STORE='okr-v3';
let state={cu:null,selU:null,exp:{},sel:null,history:{}};
function loadS(){try{const s=localStorage.getItem(STORE);if(!s)return;const d=JSON.parse(s);if(d._krs){Object.entries(d._krs).forEach(([id,k])=>{if(KRS[id])Object.assign(KRS[id],k);else KRS[id]=k});delete d._krs}if(d._users){USERS.length=0;d._users.forEach(u=>USERS.push(u));delete d._users}state={...state,...d}}catch(e){}}
function saveS(){try{localStorage.setItem(STORE,JSON.stringify({...state,_krs:KRS,_users:USERS}))}catch(e){}}
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const uById=id=>USERS.find(u=>u.id===id);
const pctCls=p=>p<0?'none':p>=100?'over':p>=70?'ok':p>=40?'warn':'risk';
const pctBadge=p=>{if(p<0)return '미등록';if(p>=100)return '↑ 초과';if(p>=70)return '정상';if(p>=40)return '주의';return '↓ 위험'};
const pct=k=>{if(!k||!k.tgt)return -1;if(k.cur===0)return -1;let r;if(k.tgt>0&&k.cur>k.tgt)r=Math.round((k.tgt/k.cur)*100);else r=Math.round((k.cur/k.tgt)*100);return Math.min(100,Math.max(0,r))};
const pctTxt=p=>p<0?'—':p+'%';
const pctW=p=>Math.max(0,p);
const status=p=>p>=95?'s':p>=70?'o':p>=40?'w':'d';

function canEdit(krId){const u=uById(state.cu);if(!u)return false;const k=KRS[krId];if(!k)return false;if(u.role==='admin')return true;if(k.owner===state.cu)return true;if(u.role==='exec'&&!krId.includes('IK'))return true;return false}
function canEditUser(){const u=uById(state.cu);return u&&(u.role==='admin'||u.role==='exec')}
// 자식 KR 집계 진척
function avgChildren(krId){const k=KRS[krId];if(!k||!k.children||!k.children.length)return null;const cs=k.children.map(c=>pct(KRS[c]));return Math.round(cs.reduce((a,b)=>a+b,0)/cs.length)}
// 사업 진척: 사업 KR들의 평균
function bizPct(bid){const ks=Object.entries(KRS).filter(([id,k])=>k.biz===bid&&!id.includes('-IK-'));if(!ks.length)return -1;const ps=ks.map(([id,k])=>pct(k)).filter(p=>p>=0);if(!ps.length)return -1;return Math.round(ps.reduce((a,b)=>a+b,0)/ps.length)}
// 전사 진척: 사업 평균
function coPct(){const ps=Object.keys(BIZ).map(b=>bizPct(b)).filter(p=>p>=0);if(!ps.length)return -1;return Math.round(ps.reduce((a,b)=>a+b,0)/ps.length)}

function selU(id){state.selU=id;renderUL()}
function doLogin(){if(!state.selU){alert('사용자 선택');return}const pw=state.passwords&&state.passwords[state.selU]?state.passwords[state.selU]:'1234';if($('#pw').value!==pw){$('#loginErr').classList.add('on');return}state.cu=state.selU;saveS();showApp()}
function showApp(){$('#login').style.display='none';$('#app').classList.add('on');const u=uById(state.cu);$('#topUav').textContent=u.name[0];$('#topUav').style.background=u.color;if(u.bu){const myBiz=Object.entries(BIZ).find(([id,b])=>b.bu===u.bu);if(myBiz){const ck=CO.krs.find(c=>c.biz===myBiz[0]);if(ck){state.exp['CO-O']=true;state.exp[ck.id]=true;state.focusBiz=myBiz[0]}}}const init=location.hash.replace('#','')||(u.role==='admin'||u.role==='exec'?'dash':'tree');go(init)}
function logout(){state.cu=null;state.selU=null;saveS();location.reload()}

// ============ ROUTE ============
function go(v){const tabs=['dash','tree','biz','rep','user','set'];if(!tabs.includes(v))v='dash';let h='';if(v==='dash')h=rDash();else if(v==='tree')h=rTree();else if(v==='biz')h=rBiz();else if(v==='rep')h=rRep();else if(v==='user')h=rUser();else if(v==='set')h=rSet();$('#root').innerHTML=`<div data-tab="${v}" class="on">${h}</div>`;$$('.tab').forEach(t=>t.classList.toggle('on',t.dataset.v===v));if(location.hash.replace('#','')!==v)history.replaceState(null,'','#'+v);window.scrollTo({top:0})}

<div class="ph"><div><h1>대시보드</h1><p>${CO.period} · D-${dLeft} · ${total}개 사업 KR</p></div></div>

<div class="fg" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px"><div><label>현재값</label><input type="number" step="any" id="krC" value="${k.cur}" ${!ed?'disabled':''}></div><div><label>목표값</label><input type="number" step="any" id="krTg" value="${k.tgt}" ${!ed?'disabled':''}></div><div><label>단위</label><input type="text" id="krU" value="${k.unit||''}" ${!ed?'disabled':''}></div></div>
<div class="fg" style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div><label>타입</label><select id="krTy" ${!ed?'disabled':''}><option value="committed" ${k.type==='committed'?'selected':''}>필수 (committed)</option><option value="aspirational" ${k.type==='aspirational'?'selected':''}>도전 (aspirational)</option></select></div><div><label>담당자</label><select id="krO" ${!ed?'disabled':''}>${USERS.map(uu=>`<option value="${uu.id}" ${uu.id===k.owner?'selected':''}>${uu.name}</option>`).join('')}</select></div></div>
${k.note?`<div class="fg"><label>세부 메모</label><div style="font-size:12px;color:var(--tx2);padding:10px 12px;background:var(--bgs);border-radius:6px;line-height:1.6;white-space:pre-line">${k.note}</div></div>`:''}${k.period?`<div class="fg"><label>실행 기간</label><div class="mono" style="font-size:12px;color:var(--tx2);padding:6px 10px;background:var(--bgs);border-radius:6px">${k.period}</div></div>`:''}<div class="fg"><label>현재값 변경 히스토리</label><div style="font-size:11px;color:var(--tx4);padding:8px 10px;background:var(--bgs);border-radius:6px">${(state.history[id]||[]).slice(-3).reverse().map(h=>`${h.at} · ${h.cur} → ${h.newCur} (${h.by})`).join('<br>')||'기록 없음'}</div></div>`;
$('#mKr').hidden=false}
function saveKr(){const id=state.currentKr;const k=KRS[id];if(!k||!canEdit(id))return;const oldCur=k.cur;k.text=$('#krT').value;k.cur=parseFloat($('#krC').value)||0;k.tgt=parseFloat($('#krTg').value)||1;k.unit=$('#krU').value;k.type=$('#krTy').value;k.owner=$('#krO').value;if(oldCur!==k.cur){if(!state.history[id])state.history[id]=[];state.history[id].push({at:new Date().toISOString().slice(0,16).replace('T',' '),cur:oldCur,newCur:k.cur,by:uById(state.cu)?.name||'-'})}saveS();closeM('mKr');go(location.hash.replace('#','')||'tree')}
function closeM(id){$('#'+id).hidden=true}

loadS();
$('#userSearch').addEventListener('input',e=>renderUL(e.target.value));
$('#pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
$('#loginBtn').addEventListener('click',doLogin);
renderUL();
if(state.cu)showApp();else state.exp['CO-O']=true;
$$('.tab').forEach(t=>t.addEventListener('click',()=>go(t.dataset.v)));

Object.assign(window,{go,selU,doLogin,logout,togE,expAll,selRow,openKr,saveKr,closeM,openBizDetail,newUser,openUser,saveUser,delUser,filterUser,openPwChange,closePwChange,savePw,saveSettings});
